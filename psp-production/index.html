<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PSP Production Log</title>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Display:wght@400;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey:            "AIzaSyC4ZnWOG_PS0sh4XI8wWYfQLNG48LjeSVs",
      authDomain:        "sewing-production-log.firebaseapp.com",
      databaseURL:       "https://sewing-production-log-default-rtdb.firebaseio.com",
      projectId:         "sewing-production-log",
      storageBucket:     "sewing-production-log.firebasestorage.app",
      messagingSenderId: "196320262022",
      appId:             "1:196320262022:web:b35cc8a118e25da3735e07"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    window.EMPLOYEES = [
      "Heather","Lakhpreet","Raman","Luz","Lovepreet",
      "Steffi","Mirna","Iris","Jennifer","Eliana",
      "Diana","Paola","Manuel","Robinson","Puneet"
    ];

    window.DEPARTMENTS = [
      "Skirt Prep","Prep (Handles, Ties, Hinges)","Bags","Repair",
      "Plastics","Profile","Top Stitch","Closing","Zippers","Pillows","Joining"
    ];

    function todayStr() { return new Date().toLocaleDateString("en-CA"); }

    function updateClock() {
      const now = new Date();
      document.getElementById("live-date").textContent =
        now.toLocaleDateString("en-CA", { weekday:"long", year:"numeric", month:"long", day:"numeric" });
      document.getElementById("live-time").textContent =
        now.toLocaleTimeString("en-CA", { hour:"2-digit", minute:"2-digit", second:"2-digit" });
    }

    window.submitAll = async function() {
      const btn = document.getElementById("submit-btn");
      const employee = document.getElementById("employee").value;
      if (!employee) { showSnackbar("Please select an employee.", "error"); return; }

      const rows = document.querySelectorAll(".job-row");
      const entries = [];
      for (const row of rows) {
        const dept = row.querySelector(".dept-sel").value;
        const qty  = parseInt(row.querySelector(".qty-input").value, 10);
        const note = row.querySelector(".note-input").value.trim();
        if (!dept || !qty || qty < 1) {
          showSnackbar("Each job row needs a department and quantity ≥ 1.", "error");
          return;
        }
        entries.push({ dept, qty, note });
      }

      btn.disabled = true;
      btn.innerHTML = `<span class="material-icons-round" style="font-size:18px;animation:spin .7s linear infinite">sync</span> Saving…`;

      try {
        const date = document.getElementById("log-date").value || todayStr();
        await Promise.all(entries.map(e =>
          db.ref("production_logs").push({
            employee, department: e.dept, quantity: e.qty,
            notes: e.note || null, date, timestamp: Date.now()
          })
        ));
        const total = entries.reduce((s, e) => s + e.qty, 0);
        showSnackbar(`${total} covers logged for ${employee}`, "success");
        document.getElementById("employee").value = "";
        document.getElementById("emp-field").classList.remove("has-value");
        document.getElementById("jobs-container").innerHTML = "";
        window.addJobRow();
      } catch (err) {
        showSnackbar("Error saving. Check connection.", "error");
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<span class="material-icons-round" style="font-size:18px">check</span> Submit All Entries`;
      }
    };

    function showSnackbar(msg, type) {
      const s = document.getElementById("snackbar");
      s.textContent = msg;
      s.className = "snackbar show " + type;
      clearTimeout(s._t);
      s._t = setTimeout(() => s.className = "snackbar", 3500);
    }

    // ── EMPLOYEE MANAGEMENT ─────────────────────────────────────────────────
    function buildEmployeeSelect() {
      const sel = document.getElementById("employee");
      const cur = sel.value;
      // Clear and rebuild
      sel.innerHTML = `<option value="" disabled selected></option>`;
      window.EMPLOYEES.slice().sort().forEach(n => {
        const o = document.createElement("option");
        o.value = o.textContent = n;
        if (n === cur) o.selected = true;
        sel.appendChild(o);
      });
    }

    window.addNewEmployee = function() {
      const input = document.getElementById("new-emp-input");
      const name  = input.value.trim();
      if (!name) return;

      // Title-case it
      const formatted = name.charAt(0).toUpperCase() + name.slice(1).toLowerCase();

      if (window.EMPLOYEES.includes(formatted)) {
        showSnackbar(`${formatted} is already in the list.`, "error");
        return;
      }

      window.EMPLOYEES.push(formatted);
      // Save to Firebase so dashboard also picks it up
      db.ref("employees/" + formatted.toLowerCase().replace(/\s+/g, "_")).set(formatted);

      buildEmployeeSelect();
      input.value = "";
      document.getElementById("add-emp-row").style.display = "none";
      document.getElementById("emp-field").classList.add("has-value");
      document.getElementById("employee").value = formatted;
      showSnackbar(`${formatted} added!`, "success");
    };

    window.toggleAddEmp = function() {
      const row = document.getElementById("add-emp-row");
      const visible = row.style.display !== "none";
      row.style.display = visible ? "none" : "flex";
      if (!visible) document.getElementById("new-emp-input").focus();
    };

    window.addEventListener("DOMContentLoaded", () => {
      document.getElementById("log-date").value = todayStr();

      // Also load any employees saved to Firebase
      db.ref("employees").once("value").then(snap => {
        if (snap.exists()) {
          snap.forEach(child => {
            const name = child.val();
            if (!window.EMPLOYEES.includes(name)) window.EMPLOYEES.push(name);
          });
        }
        buildEmployeeSelect();
      });

      document.getElementById("employee").addEventListener("change", function() {
        document.getElementById("emp-field").classList.add("has-value");
      });

      // Enter key in new employee input
      document.getElementById("new-emp-input").addEventListener("keydown", function(e) {
        if (e.key === "Enter") window.addNewEmployee();
        if (e.key === "Escape") {
          this.value = "";
          document.getElementById("add-emp-row").style.display = "none";
        }
      });

      window.addJobRow();
      updateClock();
      setInterval(updateClock, 1000);
    });
  </script>

  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeSlideIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes ripple { to { transform:scale(4); opacity:0; } }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* M3 Dark color roles */
      --md-bg:              #101418;
      --md-surface:         #1a1f25;
      --md-surface-variant: #252c35;
      --md-surface-container: #1e242c;
      --md-outline:         #3a4452;
      --md-outline-variant: #2c3540;
      --md-on-surface:      #dde3ea;
      --md-on-surface-var:  #8a9bb0;
      --md-primary:         #7cb9ff;
      --md-primary-container: #1a3a5c;
      --md-on-primary:      #003063;
      --md-secondary:       #b6c7dd;
      --md-error:           #ffb4ab;
      --md-error-container: #8c1d18;
      --md-success:         #6dd58c;

      --radius-s: 8px;
      --radius-m: 12px;
      --radius-l: 16px;
      --radius-xl: 24px;

      --elev-1: 0 1px 2px rgba(0,0,0,.3), 0 2px 6px rgba(0,0,0,.15);
      --elev-2: 0 1px 2px rgba(0,0,0,.3), 0 4px 8px rgba(0,0,0,.2);
      --elev-3: 0 4px 8px rgba(0,0,0,.3), 0 8px 16px rgba(0,0,0,.2);
    }

    body {
      background: var(--md-bg);
      color: var(--md-on-surface);
      font-family: 'Roboto', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 80px;
    }

    /* ── TOP APP BAR ── */
    .top-bar {
      width: 100%;
      background: var(--md-surface);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--elev-1);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .top-bar-title {
      font-family: 'Google Sans Display', sans-serif;
      font-size: 1.375rem;
      font-weight: 400;
      color: var(--md-on-surface);
      letter-spacing: 0;
    }

    .top-bar-title strong { font-weight: 700; color: var(--md-primary); }

    .clock-chip {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 1px;
    }

    #live-date { font-size: .72rem; color: var(--md-on-surface-var); }
    #live-time { font-family: 'Google Sans', sans-serif; font-size: .8rem; color: var(--md-primary); font-weight: 500; }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: var(--md-primary-container);
      color: var(--md-primary);
      border: none;
      border-radius: 20px;
      font-family: 'Google Sans', sans-serif;
      font-size: .85rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: filter .2s;
    }
    .nav-btn:hover { filter: brightness(1.1); }

    /* ── CONTENT ── */
    .content { width: 100%; max-width: 600px; padding: 20px 16px; display: flex; flex-direction: column; gap: 12px; }

    /* ── M3 CARD ── */
    .m3-card {
      background: var(--md-surface);
      border-radius: var(--radius-l);
      box-shadow: var(--elev-1);
      overflow: hidden;
    }

    .card-header {
      padding: 20px 20px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-header .material-icons-round { color: var(--md-primary); font-size: 20px; }

    .card-label {
      font-family: 'Google Sans', sans-serif;
      font-size: .875rem;
      font-weight: 500;
      color: var(--md-on-surface-var);
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .card-body { padding: 16px 20px 20px; display: flex; flex-direction: column; gap: 12px; }

    /* ── FILLED TEXT FIELD (M3 style) ── */
    .field { position: relative; }

    .field label {
      position: absolute;
      top: 50%;
      left: 16px;
      transform: translateY(-50%);
      font-size: .875rem;
      color: var(--md-on-surface-var);
      pointer-events: none;
      transition: all .15s;
      background: transparent;
    }

    .field.has-value label,
    .field:focus-within label {
      top: 10px;
      transform: none;
      font-size: .72rem;
      color: var(--md-primary);
    }

    .field select,
    .field input[type="date"],
    .field input[type="number"] {
      width: 100%;
      background: var(--md-surface-variant);
      border: none;
      border-bottom: 2px solid var(--md-outline);
      border-radius: var(--radius-s) var(--radius-s) 0 0;
      color: var(--md-on-surface);
      font-family: 'Roboto', sans-serif;
      font-size: .9375rem;
      padding: 24px 16px 8px;
      outline: none;
      transition: border-color .15s;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
    }

    .field select:focus,
    .field input:focus { border-bottom-color: var(--md-primary); }

    .field input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(.5); cursor: pointer; }

    .field-select-arrow {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--md-on-surface-var);
      font-size: 20px;
    }

    /* ── DIVIDER ── */
    .m3-divider { height: 1px; background: var(--md-outline-variant); margin: 4px 0; }

    /* ── SECTION LABEL ── */
    .section-lbl {
      font-family: 'Google Sans', sans-serif;
      font-size: .8rem;
      font-weight: 500;
      color: var(--md-on-surface-var);
      text-transform: uppercase;
      letter-spacing: .1em;
      padding: 4px 0 2px;
    }

    /* ── JOB ROW ── */
    #jobs-container { display: flex; flex-direction: column; gap: 10px; }

    .job-row {
      background: var(--md-surface-container);
      border-radius: var(--radius-m);
      padding: 14px 14px 12px;
      position: relative;
      animation: fadeSlideIn .2s ease;
    }

    .job-row-dept { margin-bottom: 10px; }

    .job-row-bottom {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* qty stepper */
    .qty-stepper {
      display: flex;
      align-items: center;
      background: var(--md-surface-variant);
      border-radius: 50px;
      overflow: hidden;
      height: 40px;
    }

    .step-btn {
      width: 40px;
      height: 40px;
      background: none;
      border: none;
      color: var(--md-primary);
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    .step-btn:hover { background: rgba(124,185,255,.1); }

    .qty-val {
      min-width: 44px;
      text-align: center;
      font-family: 'Google Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      color: var(--md-on-surface);
      border: none;
      background: transparent;
      outline: none;
      padding: 0 2px;
    }
    .qty-val::-webkit-inner-spin-button { display: none; }

    /* quick chips */
    .chips-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; padding-top: 4px; }

    .m3-chip {
      height: 32px;
      padding: 0 12px;
      background: var(--md-surface-variant);
      border: 1px solid var(--md-outline);
      border-radius: 8px;
      color: var(--md-on-surface-var);
      font-family: 'Google Sans', sans-serif;
      font-size: .8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      display: flex;
      align-items: center;
    }
    .m3-chip:hover { background: var(--md-primary-container); border-color: var(--md-primary); color: var(--md-primary); }

    /* note toggle */
    .note-toggle {
      display: flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      color: var(--md-on-surface-var);
      font-family: 'Google Sans', sans-serif;
      font-size: .8rem;
      font-weight: 500;
      cursor: pointer;
      padding: 6px 0 0;
      transition: color .15s;
    }
    .note-toggle:hover { color: var(--md-primary); }
    .note-toggle .material-icons-round { font-size: 16px; }

    .note-area { display: none; margin-top: 8px; }
    .note-area.open { display: block; }
    .note-area textarea {
      width: 100%;
      background: var(--md-surface-variant);
      border: none;
      border-bottom: 2px solid var(--md-outline);
      border-radius: var(--radius-s) var(--radius-s) 0 0;
      color: var(--md-on-surface);
      font-family: 'Roboto', sans-serif;
      font-size: .875rem;
      padding: 10px 14px;
      resize: none;
      outline: none;
      transition: border-color .15s;
    }
    .note-area textarea:focus { border-bottom-color: var(--md-primary); }

    /* remove row */
    .remove-row {
      position: absolute;
      top: 10px; right: 10px;
      background: none;
      border: none;
      color: var(--md-outline);
      cursor: pointer;
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .remove-row:hover { background: rgba(255,180,171,.1); color: var(--md-error); }
    .remove-row .material-icons-round { font-size: 16px; }

    /* add dept button */
    .add-dept-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 12px;
      background: none;
      border: 1px dashed var(--md-outline);
      border-radius: var(--radius-m);
      color: var(--md-on-surface-var);
      font-family: 'Google Sans', sans-serif;
      font-size: .875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      margin-top: 2px;
    }
    .add-dept-btn:hover { border-color: var(--md-primary); color: var(--md-primary); background: rgba(124,185,255,.05); }
    .add-dept-btn .material-icons-round { font-size: 18px; }

    /* ── FAB SUBMIT ── */
    .fab-area {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 32px);
      max-width: 568px;
      z-index: 20;
    }

    #submit-btn {
      width: 100%;
      height: 56px;
      background: var(--md-primary);
      color: var(--md-on-primary);
      border: none;
      border-radius: 16px;
      font-family: 'Google Sans', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .01em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: var(--elev-3);
      transition: filter .2s, transform .1s;
    }
    #submit-btn:hover:not(:disabled) { filter: brightness(1.08); transform: translateY(-1px); }
    #submit-btn:disabled { background: var(--md-outline); color: var(--md-on-surface-var); box-shadow: none; cursor: not-allowed; }
    #submit-btn .material-icons-round { font-size: 20px; }

    /* ── SNACKBAR ── */
    .snackbar {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      min-width: 280px;
      max-width: 90vw;
      background: #2e3640;
      color: var(--md-on-surface);
      border-radius: var(--radius-m);
      padding: 14px 20px;
      font-family: 'Roboto', sans-serif;
      font-size: .875rem;
      box-shadow: var(--elev-3);
      opacity: 0;
      transition: all .25s ease;
      z-index: 100;
      text-align: center;
      pointer-events: none;
    }
    .snackbar.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .snackbar.success { background: #1b3a27; color: var(--md-success); }
    .snackbar.error   { background: #3b1a18; color: var(--md-error); }
  </style>
</head>
<body>

  <!-- TOP APP BAR -->
  <div class="top-bar">
    <div class="top-bar-title">PSP <strong>Production</strong></div>
    <div style="display:flex;align-items:center;gap:12px">
      <div class="clock-chip">
        <span id="live-date"></span>
        <span id="live-time"></span>
      </div>
      <a class="nav-btn" href="dashboard.html">
        <span class="material-icons-round" style="font-size:16px">bar_chart</span>
        Dashboard
      </a>
    </div>
  </div>

  <div class="content">

    <!-- DATE + EMPLOYEE -->
    <div class="m3-card">
      <div class="card-header">
        <span class="material-icons-round">person</span>
        <span class="card-label">Who & When</span>
      </div>
      <div class="card-body">
        <div class="field has-value">
          <label>Date</label>
          <input type="date" id="log-date"/>
        </div>
        <div class="field" id="emp-field">
          <label>Employee</label>
          <select id="employee" onchange="document.getElementById('emp-field').classList.add('has-value')">
            <option value="" disabled selected></option>
          </select>
          <span class="material-icons-round field-select-arrow">expand_more</span>
        </div>

        <!-- Add new employee -->
        <button onclick="toggleAddEmp()" style="display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--md-on-surface-var);font-family:'Google Sans',sans-serif;font-size:.8rem;font-weight:500;cursor:pointer;padding:0 2px;transition:color .15s;width:fit-content;">
          <span class="material-icons-round" style="font-size:16px">person_add</span>
          Add new employee
        </button>

        <div id="add-emp-row" style="display:none;gap:8px;align-items:center;">
          <input id="new-emp-input" type="text" placeholder="First name…"
            style="flex:1;background:var(--md-surface-variant);border:none;border-bottom:2px solid var(--md-outline);border-radius:8px 8px 0 0;color:var(--md-on-surface);font-family:'Roboto',sans-serif;font-size:.9rem;padding:10px 14px;outline:none;transition:border-color .15s;"
            onfocus="this.style.borderBottomColor='var(--md-primary)'"
            onblur="this.style.borderBottomColor='var(--md-outline)'"
          />
          <button onclick="addNewEmployee()"
            style="height:40px;padding:0 16px;background:var(--md-primary);color:var(--md-on-primary);border:none;border-radius:20px;font-family:'Google Sans',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:filter .2s;"
            onmouseover="this.style.filter='brightness(1.08)'" onmouseout="this.style.filter=''">
            Add
          </button>
        </div>
      </div>
    </div>

    <!-- JOB ROWS -->
    <div class="m3-card">
      <div class="card-header">
        <span class="material-icons-round">factory</span>
        <span class="card-label">Departments & Quantities</span>
      </div>
      <div class="card-body">
        <div id="jobs-container"></div>
        <button class="add-dept-btn" onclick="addJobRow()">
          <span class="material-icons-round">add</span>
          Add Another Department
        </button>
      </div>
    </div>

  </div>

  <!-- FIXED SUBMIT -->
  <div class="fab-area">
    <button id="submit-btn" onclick="submitAll()">
      <span class="material-icons-round">check</span>
      Submit All Entries
    </button>
  </div>

  <div id="snackbar" class="snackbar"></div>

  <script>
    let rowCount = 0;

    function buildDeptOptions() {
      return window.DEPARTMENTS.map(d =>
        `<option value="${d}">${d}</option>`
      ).join("");
    }

    window.addJobRow = function() {
      rowCount++;
      const id = rowCount;
      const el = document.createElement("div");
      el.className = "job-row";
      el.dataset.id = id;

      el.innerHTML = `
        <button class="remove-row" onclick="removeRow(${id})" title="Remove">
          <span class="material-icons-round">close</span>
        </button>

        <div class="job-row-dept">
          <div class="field" id="dept-field-${id}">
            <label>Department</label>
            <select class="dept-sel" onchange="document.getElementById('dept-field-${id}').classList.add('has-value')">
              <option value="" disabled selected></option>
              ${buildDeptOptions()}
            </select>
            <span class="material-icons-round field-select-arrow">expand_more</span>
          </div>
        </div>

        <div class="job-row-bottom">
          <div class="qty-stepper">
            <button class="step-btn" onclick="adjustQty(${id}, -1)">−</button>
            <input type="number" class="qty-val qty-input" value="1" min="1" max="999"/>
            <button class="step-btn" onclick="adjustQty(${id}, 1)">+</button>
          </div>
          <div class="chips-row">
            <span style="font-size:.72rem;color:var(--md-on-surface-var);font-family:'Google Sans',sans-serif">Quick:</span>
            ${[5,10,20,25,50].map(n =>
              `<button class="m3-chip" onclick="setRowQty(${id},${n})">${n}</button>`
            ).join("")}
          </div>
        </div>

        <button class="note-toggle" onclick="toggleNote(${id})">
          <span class="material-icons-round">add</span> Add note
        </button>
        <div class="note-area" id="note-area-${id}">
          <textarea class="note-input" placeholder="Optional note…" rows="2"></textarea>
        </div>
      `;

      document.getElementById("jobs-container").appendChild(el);
    };

    window.removeRow = function(id) {
      if (document.querySelectorAll(".job-row").length <= 1) return;
      document.querySelector(`.job-row[data-id="${id}"]`).remove();
    };

    window.adjustQty = function(id, delta) {
      const input = document.querySelector(`.job-row[data-id="${id}"] .qty-input`);
      input.value = Math.max(1, (parseInt(input.value) || 0) + delta);
    };

    window.setRowQty = function(id, val) {
      document.querySelector(`.job-row[data-id="${id}"] .qty-input`).value = val;
    };

    window.toggleNote = function(id) {
      const area = document.getElementById(`note-area-${id}`);
      const btn  = document.querySelector(`.job-row[data-id="${id}"] .note-toggle`);
      const open = area.classList.toggle("open");
      btn.innerHTML = open
        ? `<span class="material-icons-round">remove</span> Hide note`
        : `<span class="material-icons-round">add</span> Add note`;
      if (open) area.querySelector("textarea").focus();
    };
  </script>
</body>
</html>
